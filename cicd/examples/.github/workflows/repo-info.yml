name: Repo Info

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch-info:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository info
        env:
          REPO: ${{ github.repository }}
        run: curl -s "https://api.github.com/repos/${REPO}" > repo.json

      - name: Show repository name
        run: jq -r .full_name repo.json

      # This step will fail on purpose: the field name should be
      # `stargazers_count`, not `stars`. Used in ch02 to demonstrate
      # how a failed step blocks the rest of the job.
      - name: Show star count
        run: |
          STARS=$(jq -e .stars repo.json)
          echo "This repo has $STARS stars"

      - name: Show description
        run: jq -r .description repo.json
