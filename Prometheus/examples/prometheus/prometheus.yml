global:
  scrape_interval: 30s
  evaluation_interval: 15s

rule_files:
  - "/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090

  - job_name: "app"
    static_configs:
      - targets:
          - "app:8000"

  - job_name: "node"
    static_configs:
      - targets:
          - "node-exporter:9100"
  
  - job_name: 'alertmanager'
    static_configs:
      - targets: 
          - "alertmanager:9093"
    metrics_path: /metrics