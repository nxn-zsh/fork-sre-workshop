global:
  scrape_interval: 30s
  evaluation_interval: 15s

rule_files:
  - "/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090

  - job_name: "demo"     # This job uses promLab's demo endpoints to get metrics and is pull based, so we don't have to configure anything else
    static_configs:
      - targets:
          - "demo.promlabs.com:10000"
          - "demo.promlabs.com:10001"
          - "demo.promlabs.com:10002"

  - job_name: "go_practice"
    static_configs:
      - targets:
          - "app:8088"

  - job_name: "node"
    static_configs:
      - targets:
          - "node-exporter:9100"
  
  - job_name: 'alertmanager'
    static_configs:
      - targets: 
          - "alertmanager:9093"
    metrics_path: /metrics