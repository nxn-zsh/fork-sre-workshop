services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    networks:
      - frontend
      - backend

  api:
    image: alpine:3.20
    command: sh -c "sleep 3 && wget -qO- http://web:80 && sleep 3600"
    depends_on:
      - web
    networks:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: myapp
      POSTGRES_PASSWORD: mysecretpassword
    networks:
      - backend

networks:
  frontend:
  backend:
